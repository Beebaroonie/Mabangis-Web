<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab - Junbert Ambassador</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(90deg, #990000 0%, #0000ff 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Marcellus SC', serif;
        }

        .logo-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 800; opacity: 0.15; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-overlay img { max-width: 40%; max-height: 40%; width: auto; height: auto; }

        .video-notification {
            position: fixed; top: 0; left: 0;
            width: 100%; z-index: 1000;
            background: #000; border-bottom: 2px solid #000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .video-notification video { width: 100%; height: auto; display: block; }

        .shrink-icon {
            position: absolute; bottom: 10px; right: 10px;
            color: #FFD700; background: rgba(0,0,0,0.6);
            padding: 8px; border-radius: 5px;
            font-size: 1rem; z-index: 1001;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .video-notification.shrunk {
            width: 40%; top: 10px; left: 10px;
            border: 2px solid #000; border-radius: 10px; overflow: hidden;
        }

        @media (orientation: landscape) {
            .video-notification { width: 12%; top: 20px; left: 20px; border: 3px solid #000; border-radius: 8px; overflow: hidden; }
            .video-notification.expanded { width: 33.33vw; }
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 85%; height: 75%;
            position: relative; z-index: 900;
            display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #FFD700 rgba(255, 255, 255, 0.1);
        }

        .fixed-nav-container {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 2000; display: none;
        }

        .back-btn-fixed {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #FFD700; padding: 10px;
            border-radius: 50%; cursor: pointer;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        .lab-header { color: #fff; text-align: center; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 10px; text-transform: uppercase; }

        .button-stack {
            display: flex; flex-direction: column;
            gap: 15px; align-items: center; width: 100%;
            padding-top: 30px; padding-bottom: 50px;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .company-logo {
            width: 120px;
            height: auto;
            object-fit: contain;
        }

        .mabangis-btn {
            background: #000; color: #fff; border: 2px solid #000; width: 80%;
            padding: 12px 5px; font-size: 1rem; font-variant: small-caps;
            letter-spacing: 2px; line-height: 1.2; cursor: pointer;
            box-shadow: inset 0 0 0 3px #000, inset 0 0 0 5px #FFD700;
        }

        .signup-btn {
            background: linear-gradient(to right, #0000ff, #990000);
            color: #FFD700; border: 4px solid #000;
            border-radius: 15px; width: 80%; padding: 12px 5px;
            font-size: 1.1rem; font-variant: small-caps; font-style: italic;
            letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .more-btn {
            background: #000; color: #FFD700; border: 1px solid #FFD700;
            border-radius: 20px; width: 25%; padding: 5px 0;
            font-size: 0.7rem; letter-spacing: 1px; cursor: pointer;
        }

        .event-text, .chat-text { color: #fff; font-size: 0.7rem; font-variant: small-caps; letter-spacing: 1.5px; opacity: 0.9; }

        .content-section { display: none; color: #fff; line-height: 1.6; text-align: left; }
        .content-section h2 { color: #FFD700; font-size: 1.4rem; margin-bottom: 15px; text-transform: uppercase; }

        .aggressive-glow {
            color: #fff; text-align: center;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            animation: pulse-red 1.5s infinite alternate;
        }
        @keyframes pulse-red {
            from { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
            to { text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 50px #990000; }
        }

        .spacer-top { height: 80px; }
        .spacer-bottom { height: 100px; }

        .contact-info { margin-top: auto; padding: 25px 0; color: rgba(255, 255, 255, 0.8); text-align: center; font-size: 0.8rem; }
        .social-icons { margin-bottom: 15px; display: flex; gap: 35px; font-size: 1.8rem; justify-content: center; }
        .social-icons a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="logo-overlay"><img src="assets/logo.png" alt="Lab Logo"></div>

    <div class="video-notification" id="broadcast" onclick="handleVideoToggle()">
        <video autoplay muted loop playsinline id="main-video"><source src="assets/Mabangis.mp4" type="video/mp4"></video>
        <div class="shrink-icon" id="toggle-icon"><i class="fas fa-expand"></i></div>
    </div>

    <div id="back-nav-container" class="fixed-nav-container" onclick="showButtons()">
        <div class="back-btn-fixed"><i class="fas fa-arrow-left"></i></div>
    </div>

    <div class="container" id="main-container">
        <div id="menu-view">
            <div class="button-stack">
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Company Logo (Martial Artists Emblem)" class="company-logo">
                </div>

                <div class="lab-header">The Complete Art</div>
                <span class="event-text">What is</span>
                <button class="mabangis-btn" onclick="loadAndShow('juego')">Juego Todo</button>
                <button class="mabangis-btn" onclick="loadAndShow('mabangis')">Mabangis</button>
                <button class="mabangis-btn" onclick="loadAndShow('junbert')">Junbert</button>

                <div style="display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; margin-top: 10px;">
                    <button class="signup-btn" onclick="loadAndShow('signup')">Sign Up</button>
                    <span class="event-text">Incoming Events</span>
                    <button class="more-btn">More</button>
                </div>
            </div>
        </div>

        <div id="dynamic-content" class="content-section"></div>

        <div class="contact-info" id="footer-info">
            <div class="chat-text">Chat with me</div>
            <div class="social-icons">
                <a href="https://www.instagram.com/mr.gen.z" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.facebook.com/share/1CSQm8biy9/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="mailto:elitefilipinomaharlika@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            </div>
            <strong>elitefilipinomaharlika@gmail.com</strong>
        </div>
    </div>

    <script>
        function handleVideoToggle() {
            const video = document.getElementById('broadcast');
            const icon = document.querySelector('#toggle-icon i');
            if (window.innerWidth > window.innerHeight) { video.classList.toggle('expanded'); }
            else { video.classList.toggle('shrunk'); }
            icon.className = (video.classList.contains('expanded') || !video.classList.contains('shrunk')) ? 'fas fa-compress' : 'fas fa-expand';
        }

        async function loadAndShow(fileName) {
            const container = document.getElementById('dynamic-content');
            const menu = document.getElementById('menu-view');
            const backBtn = document.getElementById('back-nav-container');

            try {
                const response = await fetch(`${fileName}.html`);
                if (!response.ok) throw new Error('System error: Sub-entity not found.');
                const html = await response.text();

                container.innerHTML = html;
                menu.style.display = 'none';
                container.style.display = 'block';
                backBtn.style.display = 'block';
                document.getElementById('main-container').scrollTop = 0;
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="spacer-top"></div><h2>Error</h2><p>Failed to load ${fileName}.html. Use Ɓb to check if the file exists in the directory.</p>`;
                container.style.display = 'block';
            }
        }

        function showButtons() {
            document.getElementById('menu-view').style.display = 'block';
            document.getElementById('dynamic-content').style.display = 'none';
            document.getElementById('back-nav-container').style.display = 'none';
        }
    </script>
</body>
</html>
